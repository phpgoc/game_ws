<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WS 房间测试页</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    input, button { padding: 6px 8px; font-size: 14px; }
    input { min-width: 180px; }
    button { cursor: pointer; }
    #log { border: 1px solid #ddd; padding: 10px; min-height: 320px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #fafafa; }
    .hint { color: #666; font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h3>WS 房间测试（create/join/quit/disband/message/pause/resume）</h3>
  <div class="hint">开多个标签页测试：相同 password 在同房间，广播只会发到同房间。</div>

  <div class="row">
    <input id="url" value="ws://127.0.0.1:9001" />
    <button id="connect">连接</button>
    <button id="disconnect">断开</button>
  </div>

  <div class="row">
    <input id="name" placeholder="name" value="u1" />
    <input id="password" placeholder="password(room key)" value="p1" />
    <input id="message" placeholder="message" value="hello" />
  </div>

  <div class="row">
    <button data-route="1" id="create">CREATE</button>
    <button data-route="2" id="join">JOIN</button>
    <button data-route="3" id="quit">QUIT</button>
    <button data-route="7" id="disband">DISBAND</button>
    <button data-route="4" id="send-message">MESSAGE</button>
    <button data-route="5" id="pause">PAUSE</button>
    <button data-route="6" id="resume">RESUME</button>
    <button data-route="10" id="start">START</button>
    <button id="clear-log">清空日志</button>
  </div>

  <div class="row">
    <label>round_time: <input id="round_time" type="number" min="20" max="40" value="30" style="width: 60px;" />
      <span id="round_time_label" style="font-size: 12px; color: #666;">20~40</span>
    </label>
    <label>away_time: <input id="away_time" type="number" min="2" max="5" value="5" style="width: 60px;" />
      <span id="away_time_label" style="font-size: 12px; color: #666;">2~5</span>
    </label>
    <label>play_time: <input id="play_time" type="number" min="100" max="500" value="300" style="width: 60px;" />
      <span id="play_time_label" style="font-size: 12px; color: #666;">100~500</span>
    </label>
    <label>deal_time: <input id="deal_time" type="number" min="500" max="4000" value="3000" style="width: 60px;" />
      <span id="deal_time_label" style="font-size: 12px; color: #666;">500~4000</span>
    </label>
    <button id="apply-settings">应用设置</button>
  </div>

  <div id="log"></div>

  <script>
    /** Routes */
    const ROUTES = {
      CREATE: 1,
      JOIN: 2,
      QUIT: 3,
      MESSAGE: 4,
      PAUSE: 5,
      RESUME: 6,
      DISBAND: 7,
      SETTING: 8,
      START: 10,
    };

    let ws = null;

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");

    function now() {
      return new Date().toLocaleTimeString();
    }

    function log(line, obj) {
      let text = `[${now()}] ${line}`;
      if (obj !== undefined) {
        text += `\n${JSON.stringify(obj, null, 2)}`;
      }
      logEl.textContent += `${text}\n\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function send(route, data) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("连接未建立，无法发送");
        return;
      }
      const payload = { route, data };
      ws.send(JSON.stringify(payload));
      log("=> 发出请求", payload);
    }

    $("connect").onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        log("已连接");
        return;
      }
      const url = $("url").value.trim();
      ws = new WebSocket(url);
      ws.onopen = () => log(`已连接 ${url}`);
      ws.onclose = () => log("连接已关闭");
      ws.onerror = (e) => log("连接错误", { type: e.type });
      ws.onmessage = (event) => {
        let data = event.data;
        try {
          data = JSON.parse(event.data);
          
          // Handle CREATE response (code 0 with full settings: {current, min, max})
          if (data.code === 0 && data.data && typeof data.data === 'object') {
            if (data.data.round_time && data.data.round_time.current !== undefined) {
              // Full settings format (from CREATE)
              updateSettingsDisplay(data.data, true);
              updateSettingsRange(data.data);
            }
          }
          
          // Handle JOIN response (status JOINED with current values only)
          if (data.status === 'JOINED' && data.data) {
            // Current values format (from JOIN)
            updateSettingsDisplay(data.data, false);
          }
        } catch (_) {}
        log("<= 收到消息", data);
      };

      function updateSettingsDisplay(settings, isFullFormat) {
        if (isFullFormat) {
          // Full format: {current, min, max}
          if (settings.round_time && settings.round_time.current !== undefined) {
            $("round_time").value = settings.round_time.current;
          }
          if (settings.away_time && settings.away_time.current !== undefined) {
            $("away_time").value = settings.away_time.current;
          }
          if (settings.play_time && settings.play_time.current !== undefined) {
            $("play_time").value = settings.play_time.current;
          }
          if (settings.deal_time && settings.deal_time.current !== undefined) {
            $("deal_time").value = settings.deal_time.current;
          }
        } else {
          // Current values only format: {round_time: 30, away_time: 5, ...}
          if (settings.round_time !== undefined) {
            $("round_time").value = settings.round_time;
          }
          if (settings.away_time !== undefined) {
            $("away_time").value = settings.away_time;
          }
          if (settings.play_time !== undefined) {
            $("play_time").value = settings.play_time;
          }
          if (settings.deal_time !== undefined) {
            $("deal_time").value = settings.deal_time;
          }
        }
      }

      function updateSettingsRange(settings) {
        // Update min/max labels based on full settings from CREATE
        if (settings.round_time) {
          $("round_time_label").textContent = `${settings.round_time.min}~${settings.round_time.max}`;
          $("round_time").min = settings.round_time.min;
          $("round_time").max = settings.round_time.max;
        }
        if (settings.away_time) {
          $("away_time_label").textContent = `${settings.away_time.min}~${settings.away_time.max}`;
          $("away_time").min = settings.away_time.min;
          $("away_time").max = settings.away_time.max;
        }
        if (settings.play_time) {
          $("play_time_label").textContent = `${settings.play_time.min}~${settings.play_time.max}`;
          $("play_time").min = settings.play_time.min;
          $("play_time").max = settings.play_time.max;
        }
        if (settings.deal_time) {
          $("deal_time_label").textContent = `${settings.deal_time.min}~${settings.deal_time.max}`;
          $("deal_time").min = settings.deal_time.min;
          $("deal_time").max = settings.deal_time.max;
        }
      }
    };

    $("disconnect").onclick = () => {
      if (ws) ws.close();
    };

    $("create").onclick = () => {
      send(ROUTES.CREATE, { name: $("name").value.trim(), password: $("password").value.trim() });
    };
    $("join").onclick = () => {
      send(ROUTES.JOIN, { name: $("name").value.trim(), password: $("password").value.trim() });
    };
    $("quit").onclick = () => send(ROUTES.QUIT, {});
    $("disband").onclick = () => send(ROUTES.DISBAND, {});
    $("pause").onclick = () => send(ROUTES.PAUSE, {});
    $("resume").onclick = () => send(ROUTES.RESUME, {});
    $("send-message").onclick = () => {
      send(ROUTES.MESSAGE, { message: $("message").value });
    };
    $("start").onclick = () => {
      send(ROUTES.START, {});
    };

    $("apply-settings").onclick = () => {
      // SETTING request only sends current values
      const settings = {
        round_time: parseInt($("round_time").value),
        away_time: parseInt($("away_time").value),
        play_time: parseInt($("play_time").value),
        deal_time: parseInt($("deal_time").value),
      };
      send(ROUTES.SETTING, settings);
    };

    $("clear-log").onclick = () => {
      logEl.textContent = "";
    };
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WS 房间测试页</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 16px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    input, button { padding: 6px 8px; font-size: 14px; }
    input { min-width: 180px; }
    button { cursor: pointer; }
    #log { border: 1px solid #ddd; padding: 10px; min-height: 320px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #fafafa; }
    .hint { color: #666; font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h3>WS 房间测试（create/join/quit/disband/message/pause/resume）</h3>
  <div class="hint">开多个标签页测试：相同 password 在同房间，广播只会发到同房间。</div>

  <div class="row">
    <input id="url" value="ws://127.0.0.1:9001" />
    <button id="connect">连接</button>
    <button id="disconnect">断开</button>
  </div>

  <div class="row">
    <input id="name" placeholder="name" value="u1" />
    <input id="password" placeholder="password(room key)" value="p1" />
    <input id="message" placeholder="message" value="hello" />
  </div>

  <div class="row">
    <button data-route="1" id="create">CREATE</button>
    <button data-route="2" id="join">JOIN</button>
    <button data-route="3" id="quit">QUIT</button>
    <button data-route="7" id="disband">DISBAND</button>
    <button data-route="4" id="send-message">MESSAGE</button>
    <button data-route="5" id="pause">PAUSE</button>
    <button data-route="6" id="resume">RESUME</button>
    <button data-route="10" id="start">START</button>
    <button id="clear-log">清空日志</button>
  </div>

  <div class="row">
    <label>round_time: <input id="round_time" type="number" min="20" max="40" value="30" style="width: 60px;" />
      <span id="round_time_label" style="font-size: 12px; color: #666;">20~40</span>
    </label>
    <label>away_time: <input id="away_time" type="number" min="2" max="5" value="5" style="width: 60px;" />
      <span id="away_time_label" style="font-size: 12px; color: #666;">2~5</span>
    </label>
    <label>play_time: <input id="play_time" type="number" min="100" max="500" value="300" style="width: 60px;" />
      <span id="play_time_label" style="font-size: 12px; color: #666;">100~500</span>
    </label>
    <label>deal_time: <input id="deal_time" type="number" min="500" max="4000" value="3000" style="width: 60px;" />
      <span id="deal_time_label" style="font-size: 12px; color: #666;">500~4000</span>
    </label>
    <button id="apply-settings">应用设置</button>
  </div>

  <div id="log"></div>

  <script>
    /** Routes */
    const ROUTES = {
      CREATE: 1,
      JOIN: 2,
      QUIT: 3,
      MESSAGE: 4,
      PAUSE: 5,
      RESUME: 6,
      DISBAND: 7,
      SETTING: 8,
      START: 10,
    };

    let ws = null;

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");

    function now() {
      return new Date().toLocaleTimeString();
    }

    function log(line, obj) {
      let text = `[${now()}] ${line}`;
      if (obj !== undefined) {
        text += `\n${JSON.stringify(obj, null, 2)}`;
      }
      logEl.textContent += `${text}\n\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function send(route, data) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("连接未建立，无法发送");
        return;
      }
      const payload = { route, data };
      ws.send(JSON.stringify(payload));
      log("=> 发出请求", payload);
    }

    $("connect").onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        log("已连接");
        return;
      }
      const url = $("url").value.trim();
      ws = new WebSocket(url);
      ws.onopen = () => log(`已连接 ${url}`);
      ws.onclose = () => log("连接已关闭");
      ws.onerror = (e) => log("连接错误", { type: e.type });
      ws.onmessage = (event) => {
        let data = event.data;
        try {
          data = JSON.parse(event.data);
          
          // Handle CREATE/JOIN response to update settings display
          if (data.status === 'JOINED' && data.data) {
            // JOIN response with JOINED status
            const settings = data.data;
            updateSettingsDisplay(settings);
          } else if (data.code === 0 && data.data && typeof data.data === 'object' && (data.data.round_time || data.data.away_time || data.data.play_time || data.data.deal_time)) {
            // CREATE response (code 0 with settings data)
            const settings = data.data;
            updateSettingsDisplay(settings);
          }
        } catch (_) {}
        log("<= 收到消息", data);
      };

      function updateSettingsDisplay(settings) {
        if (settings.round_time && settings.round_time.default !== undefined) {
          $("round_time").value = settings.round_time.default;
        }
        if (settings.away_time && settings.away_time.default !== undefined) {
          $("away_time").value = settings.away_time.default;
        }
        if (settings.play_time && settings.play_time.default !== undefined) {
          $("play_time").value = settings.play_time.default;
        }
        if (settings.deal_time && settings.deal_time.default !== undefined) {
          $("deal_time").value = settings.deal_time.default;
        }
      }
    };

    $("disconnect").onclick = () => {
      if (ws) ws.close();
    };

    $("create").onclick = () => {
      send(ROUTES.CREATE, { name: $("name").value.trim(), password: $("password").value.trim() });
    };
    $("join").onclick = () => {
      send(ROUTES.JOIN, { name: $("name").value.trim(), password: $("password").value.trim() });
    };
    $("quit").onclick = () => send(ROUTES.QUIT, {});
    $("disband").onclick = () => send(ROUTES.DISBAND, {});
    $("pause").onclick = () => send(ROUTES.PAUSE, {});
    $("resume").onclick = () => send(ROUTES.RESUME, {});
    $("send-message").onclick = () => {
      send(ROUTES.MESSAGE, { message: $("message").value });
    };
    $("start").onclick = () => {
      send(ROUTES.START, {});
    };

    $("apply-settings").onclick = () => {
      const settings = {
        round_time: { default: parseInt($("round_time").value), min: 20, max: 40 },
        away_time: { default: parseInt($("away_time").value), min: 2, max: 5 },
        play_time: { default: parseInt($("play_time").value), min: 100, max: 500 },
        deal_time: { default: parseInt($("deal_time").value), min: 500, max: 4000 },
      };
      send(ROUTES.SETTING, { settings });
    };

    $("clear-log").onclick = () => {
      logEl.textContent = "";
    };
  </script>
</body>
</html>
